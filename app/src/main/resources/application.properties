spring.application.name=techwrite-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/techwrite}
spring.datasource.username=${DB_USERNAME:techwrite}
spring.datasource.password=${DB_PASSWORD:change-me}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

techwrite.security.enabled=${TECHWRITE_SECURITY_ENABLED:false}
techwrite.security.allowed-origins=${TECHWRITE_ALLOWED_ORIGINS:http://localhost:5173}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/techwrite}
